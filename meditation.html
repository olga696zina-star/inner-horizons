<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Медитации — Inner Horizons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #151e2d, #0a0e14);
            min-height: 100vh;
            font-family: 'Georgia', serif;
            color: #ece3d7;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            padding: 40px 45px 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-size: 26px;
            font-weight: 400;
            color: #f5d7b3;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span { color: #8f847a; font-weight: 300; }
        .logo .icon { font-size: 28px; opacity: 0.7; }
        .nav {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #b3a89c;
            text-decoration: none;
            font-size: 15px;
            transition: 0.25s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 4px;
        }
        .nav a:hover { color: #f5d7b3; border-bottom-color: #f5d7b3; }
        .content {
            padding: 30px 10px;
            text-align: center;
        }
        .content h1 {
            font-size: 38px;
            font-weight: 400;
            color: #f5d7b3;
            margin-bottom: 8px;
        }
        .content .sub {
            color: #a89f94;
            font-size: 17px;
            font-style: italic;
            margin-bottom: 10px;
        }
        .disclaimer {
            background: rgba(200, 100, 100, 0.06);
            border: 1px solid rgba(200, 100, 100, 0.1);
            border-radius: 16px;
            padding: 16px 20px;
            margin: 20px 0 30px;
            font-size: 14px;
            color: #b3a89c;
            line-height: 1.6;
            text-align: left;
        }
        .disclaimer strong {
            color: #f5a8a8;
        }
        .disclaimer a {
            color: #f5d7b3;
            text-decoration: none;
        }
        .disclaimer a:hover {
            text-decoration: underline;
        }
        .welcome-block {
            background: rgba(245,215,179,0.06);
            border-radius: 18px;
            padding: 30px 24px;
            margin: 10px 0 30px;
            border-left: 3px solid #f5d7b3;
            text-align: center;
        }
        .welcome-block h2 {
            font-size: 22px;
            font-weight: 400;
            color: #f5d7b3;
            margin-bottom: 12px;
        }
        .welcome-block p {
            color: #ddd6cc;
            font-size: 16px;
            line-height: 1.7;
            max-width: 500px;
            margin: 0 auto;
        }
        .welcome-block .btn-start {
            margin-top: 16px;
            padding: 12px 40px;
            background: rgba(245,215,179,0.1);
            color: #f5d7b3;
            border: 1px solid rgba(245,215,179,0.2);
            border-radius: 40px;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Georgia', serif;
        }
        .welcome-block .btn-start:hover {
            background: rgba(245,215,179,0.2);
        }
        .action-block {
            display: none;
        }
        .emotion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin: 20px 0 30px;
        }
        .emotion-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 16px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
            color: #b3a89c;
        }
        .emotion-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(245, 215, 179, 0.2);
            color: #f5d7b3;
        }
        .emotion-card.selected {
            background: rgba(245, 215, 179, 0.1);
            border-color: #f5d7b3;
            color: #f5d7b3;
        }
        .player-area {
            margin: 30px 0;
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: none;
        }
        .player-area .btn {
            padding: 14px 48px;
            background: #f5d7b3;
            color: #0b0f1a;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Georgia', serif;
        }
        .player-area .btn:hover {
            background: #ffebd0;
            transform: scale(1.02);
        }
        .player-area .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .player-area .status {
            margin-top: 16px;
            font-size: 15px;
            color: #a89f94;
        }
        .btn-back {
            margin-top: 30px;
            display: inline-block;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.04);
            color: #b3a89c;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            font-size: 15px;
            font-family: 'Georgia', serif;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-back:hover { background: rgba(255, 255, 255, 0.08); color: #f5d7b3; }
        .footer {
            margin-top: 50px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            padding-bottom: 16px;
        }
        .footer-col h4 {
            font-size: 12px;
            font-weight: 400;
            color: #8f847a;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .footer-col ul {
            list-style: none;
            padding: 0;
        }
        .footer-col ul li {
            margin-bottom: 4px;
        }

            color: #6
